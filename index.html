<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Source+Code+Pro:400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,400i,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" type="text/css">
    <title>Company Name</title>
  </head>
  <body>
    <header>
      <div class="container" id="header">
        <div class="nav">  
          <button class="dropbtn">
            <span class="line"></span>
            <span class="line"></span>
            <span class="line"></span>
          </button>
          <div class="dropdown-content">
            <a href="#about-img">About Us</a><br>
            <a href="#services-img">Services</a><br>
            <a href="#contact-img">Contact Us</a>
          </div>
        </div>
        <div class="banner">
          <img src="images/Sacramento_Skyline_at_Night.jpg" id="banner-img">  
          <div class="banner-overlay">
            <div class="banner-text">
              <h1 id="name">*Company Name*</h1>
              <h2 id="slogan">Company slogan</h2>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <div class="container" id="main">
        <div class="about">
          <img src="images/about_us.png" id="about-img">
          <div class="box">
            <p id="about-text">Company description</p>
          </div>
        </div>
        <div class="services">
          <img src="images/services.png" id="services-img">
          <div class="box">
            <p id="services-text">Company services</p>
          </div>
        </div>  
        <div  class="contact">
          <img src="images/contact_us.png" id="contact-img">
          <div class="box">  
            <p id="contact-text">Company contact info</p>
          </div>
        </div>
      </div>
    </main>
    <br>
    <footer>
      <p id="footer-name">Company Name&copy;</p>
      <p id="footer-est">Est. 2020</p>
    </footer> 
  </body>
</html>
